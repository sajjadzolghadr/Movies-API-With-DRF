<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies API</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .card{
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 25px rgba(0,0,0,.2);
        }

        .card img{
            height:320px;
            object-fit:cover;
        }

        .badge{
            font-size:14px;
        }
    </style>

</head>
<body>

<div class="container py-5">

    <h1 class="text-center fw-bold mb-3">
        🎬 Movies API
    </h1>

    <p class="text-center text-muted mb-5">
        Django REST Framework Movie Collection
    </p>

    <!-- Search -->

    <form action="/movies/" method="get" class="mb-5">

        <div class="input-group input-group-lg">

            <input
                    type="text"
                    class="form-control"
                    name="search"
                    placeholder="Search by movie, category, rating or duration...">

            <button class="btn btn-dark">
                Search
            </button>

        </div>

    </form>

    <!-- API Buttons -->

    <div class="text-center mb-5">

        <a href="/movies/" class="btn btn-primary me-2">
            All Movies
        </a>

        <a href="/action/" class="btn btn-danger me-2">
            Action
        </a>

        <a href="/comedy/" class="btn btn-success">
            Comedy
        </a>

    </div>

    <!-- Cards -->

    <div class="row">

        {% for movie in movies %}

        <div class="col-md-4 mb-4">

            <div class="card shadow border-0 h-100">

                <img src="{{ movie.image.url }}"
                     class="card-img-top"
                     alt="{{ movie.name }}">

                <div class="card-body">

                    <h4 class="fw-bold">
                        {{ movie.name }}
                    </h4>

                    <span class="badge bg-primary">
                        {{ movie.typ }}
                    </span>

                    <hr>

                    <p>

                        ⭐ Rating :
                        <strong>{{ movie.rating }}</strong>

                    </p>

                    <p>

                        ⏱ Duration :
                        <strong>{{ movie.duration }} hr</strong>

                    </p>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12">

            <div class="alert alert-warning text-center">

                No movies found.

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
